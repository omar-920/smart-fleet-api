<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FCM Token Tester</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h2>اختبار إشعارات Firebase 🚀</h2>
<button id="getTokenBtn" style="padding: 10px 20px; font-size: 18px; cursor: pointer;">
    هات الـ Device Token
</button>
<br><br>
<textarea id="tokenDisplay" rows="6" cols="70" readonly style="font-size: 14px; padding: 10px;"></textarea>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    // الـ Config بتاعك
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyBrCXV6pfct3tlGHudO-Fx3G8hr5J-0tSg",
        authDomain: "smart-fleet-121fc.firebaseapp.com",
        projectId: "smart-fleet-121fc",
        storageBucket: "smart-fleet-121fc.firebasestorage.app",
        messagingSenderId: "379304020890",
        appId: "1:379304020890:web:65ff4268ca6de996260823",
        measurementId: "G-K708RFEER3"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    document.getElementById('getTokenBtn').addEventListener('click', async () => {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {

                // 1. تسجيل الملف يدوياً
                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

                // 2. السطر السحري: استنى لحد ما الملف يكون Ready تماماً
                await navigator.serviceWorker.ready;

                // 3. طلب التوكن بأمان
                const token = await getToken(messaging, {
                    vapidKey: 'BBzyoSNsf-AqE3FCctYdvVJbIjYYrosD4hogQ5p7fG7IiK8P6vBHIJYhXBmWq1UX1WcJd3D8oPd_GWfRqAsVOOA',
                    serviceWorkerRegistration: registration
                });

                document.getElementById('tokenDisplay').value = token;
                console.log("مبروك التوكن:", token);
            } else {
                alert('لازم توافق على الإشعارات من المتصفح!');
            }
        } catch (error) {
            console.error('حصل إيرور:', error);
            alert('إيرور: ' + error.message);
        }
    });
</script>
</body>
</html>
